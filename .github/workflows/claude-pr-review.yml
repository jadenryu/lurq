name: Claude PR review

# Stage 4 in the loop: the INDEPENDENT review gate. Runs on every PR — including
# the ones the agent opens — with a fresh context, so it doesn't share the
# author's blind spots. Review only: this job has no write access to code.

on:
  pull_request:
    types: [opened, synchronize, reopened]

# If new commits land while a review is running, cancel the stale run. Saves tokens.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read        # read the code only — a reviewer must not modify it
      pull-requests: write  # post the review as a PR comment
      issues: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history so Claude can diff against the base branch

      # Install lurq's toolchain so Claude can actually run the checks it cites,
      # instead of guessing from the diff alone.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request as an INDEPENDENT, adversarial reviewer.
            Assume the author — which may be an AI agent — has blind spots. Your
            job is to find what is wrong, not to agree. Concentrate on:
              - correctness bugs and unhandled edge cases
              - regressions in typosquat detection or anti-hallucination ranking
                (this is lurq's core value — scrutinize it hardest)
              - SQL / pgvector query safety, injection risk, and null/empty results
              - tests: is the changed behavior actually covered, or just asserted?
            Cite specific file paths and line numbers. If nothing material is
            wrong, say so plainly rather than inventing nitpicks. Do not modify
            any files.
          # Sonnet is the right default for review — cheaper, and review is
          # cheaper than authoring. Bump to opus only for unusually subtle PRs.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 12
